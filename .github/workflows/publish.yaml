# Publish to npm using OpenID Connect (OIDC) — no long-lived NPM_TOKEN in GitHub secrets
# when the package is linked to this workflow as a "Trusted Publisher" on npmjs.com.
#
# Triggers:
# - workflow_dispatch: run manually from the Actions tab
# - release (published): when you publish a GitHub Release (optional automation)
#
# Before this works: register this exact workflow path on npm (see docs/maintainers.md).
# If publish returns E404, see docs/maintainers.md (environment, workflow file, secrets).

name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # If npm "Trusted Publisher" was set up WITH a GitHub Environment, uncomment and set
    # the name to match npm EXACTLY (case-sensitive). Leave commented if npm has no environment.
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Publish to npm
        # prepack runs build:lib (see package.json). Do not set NODE_AUTH_TOKEN here:
        # a repo/org secret with that name overrides OIDC and breaks trusted publishing.
        run: npm publish --access public --provenance
