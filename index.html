<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fresnel Lake — three.js</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a1622; }
    #info {
      position: fixed; left: 12px; bottom: 10px; z-index: 10;
      font: 12px/1.4 system-ui, sans-serif; color: rgba(255,255,255,.7);
      text-shadow: 0 1px 2px rgba(0,0,0,.6); pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">拖拽旋转 · 滚轮缩放 — 远处水面镜面反射雪山，近处水清澈见底（菲涅尔）</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Water } from 'three/addons/objects/Water.js';

    // ---------- value-noise terrain heightfield ----------
    function hash(x, y) {
      const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }
    function vnoise(x, y) {
      const xi = Math.floor(x), yi = Math.floor(y);
      const xf = x - xi, yf = y - yi;
      const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
      const a = hash(xi, yi), b = hash(xi + 1, yi);
      const c = hash(xi, yi + 1), d = hash(xi + 1, yi + 1);
      return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
    }
    function fbm(x, y) {
      let s = 0, a = 0.5, f = 1;
      for (let i = 0; i < 5; i++) { s += a * vnoise(x * f, y * f); f *= 2; a *= 0.5; }
      return s;
    }
    // ridged fbm -> sharp mountain crests
    function ridged(x, y) {
      let s = 0, a = 0.5, f = 1;
      for (let i = 0; i < 5; i++) {
        let n = vnoise(x * f, y * f);
        n = 1 - Math.abs(2 * n - 1);
        s += a * n * n; f *= 2; a *= 0.5;
      }
      return s;
    }
    function smoothstep(e0, e1, x) {
      const t = Math.min(1, Math.max(0, (x - e0) / (e1 - e0)));
      return t * t * (3 - 2 * t);
    }
    // height(x,z): open sea, a compact snow massif far away, a small island near the camera.
    const MTN = { x: 0, z: -800, r: 170 };  // distant mountain massif, pushed far across the sea
    const ISLE = { x: 0, z: 150, r: 24 };    // very small island, opposite side
    function height(x, z) {
      const sea = -7 + (fbm(x * 0.012, z * 0.012) - 0.5) * 2.0; // sea floor (stays underwater)

      // distant mountain massif — localised so it covers ~1/4 of the old full-width ridge
      const mr = Math.hypot(x - MTN.x, z - MTN.z) / MTN.r;
      const mMask = smoothstep(1.0, 0.2, mr);
      const ridge = ridged(x * 0.011 + 10, z * 0.011 + 10);
      const peakVar = 0.5 + 0.8 * fbm(x * 0.006 - 5, 3.0);
      const mountain = mMask * (10 + ridge * 78 * peakVar);

      // small island near the camera
      const ir = Math.hypot(x - ISLE.x, z - ISLE.z) / ISLE.r;
      const iMask = smoothstep(1.0, 0.15, ir);
      // +8 lifts the island clear of the -7 sea floor so it actually breaks the surface
      const island = iMask * (8 + fbm(x * 0.045 + 3, z * 0.045 + 3) * 11);

      return sea + mountain + island;
    }

    // ---------- scene ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xcfe1f0, 900, 5000);

    const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.5, 8000);
    camera.position.set(0, 46, 300); // high vantage behind the tiny island

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 12, -250); // over the islet, far across the sea to the distant mountains
    controls.maxPolarAngle = Math.PI * 0.495; // don't go under the water
    controls.minDistance = 10;
    controls.maxDistance = 700;
    controls.update();

    // single source of truth for the sun: everything (light, sky disc, water specular) uses this
    const sunDir = new THREE.Vector3(0.22, 0.26, -0.64).normalize();

    // ---------- sky dome: gradient + visible sun + drifting clouds ----------
    const sky = new THREE.Mesh(
      new THREE.SphereGeometry(6000, 32, 16),
      new THREE.ShaderMaterial({
        side: THREE.BackSide, depthWrite: false, fog: false,
        uniforms: {
          top: { value: new THREE.Color(0x2a6dd6) },
          bottom: { value: new THREE.Color(0xdcecf7) },
          sunDir: { value: sunDir },
          sunColor: { value: new THREE.Color(0xfff6e2) },
          time: { value: 0 },
        },
        vertexShader: `varying vec3 vDir; void main(){
          vDir = normalize((modelMatrix * vec4(position,1.0)).xyz);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }`,
        fragmentShader: `
          varying vec3 vDir;
          uniform vec3 top, bottom, sunDir, sunColor;
          uniform float time;

          float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
          float noise(vec2 p){
            vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
            float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
            return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
          }
          float fbm(vec2 p){ float s=0.0,a=0.5; for(int i=0;i<5;i++){ s+=a*noise(p); p*=2.0; a*=0.5; } return s; }

          void main(){
            vec3 dir = normalize(vDir);
            float t = clamp(dir.y*1.1 + 0.15, 0.0, 1.0);
            vec3 col = mix(bottom, top, t);

            // procedural clouds on a dome projection, faded near the horizon
            if (dir.y > 0.02) {
              vec2 uv = dir.xz / (dir.y + 0.12);
              uv = uv * 0.7 + vec2(time * 0.012, time * 0.004);
              float n = fbm(uv * 1.6);
              float cl = smoothstep(0.52, 0.95, n) * smoothstep(0.03, 0.3, dir.y);
              vec3 cloudCol = mix(vec3(0.78,0.82,0.88), vec3(1.0), 0.6); // soft white, sun-tinted lift
              col = mix(col, cloudCol, cl * 0.92);
            }

            // visible sun: soft disc + warm glow halo
            float sd = max(dot(dir, normalize(sunDir)), 0.0);
            float disc = smoothstep(0.9965, 0.9986, sd);
            float glow = pow(sd, 90.0) * 0.9 + pow(sd, 14.0) * 0.35;
            col = mix(col, sunColor, clamp(disc + glow, 0.0, 1.0));

            gl_FragColor = vec4(col, 1.0);
          }`,
      })
    );
    scene.add(sky);

    // ---------- lights: the sun is the key; faint sky term keeps shadows blue, never black ----------
    const sun = new THREE.DirectionalLight(0xfff3df, 2.6);
    sun.position.copy(sunDir).multiplyScalar(400);
    scene.add(sun);
    // soft sky light (physically the blue sky), so shaded faces read as cool not dark
    scene.add(new THREE.HemisphereLight(0xc4dcf2, 0xeef2f5, 0.85));

    // ---------- terrain ----------
    const SIZE = 2200, SEG = 512; // big enough to host the far mountains and the island
    const terrainGeo = new THREE.PlaneGeometry(SIZE, SIZE, SEG, SEG);
    terrainGeo.rotateX(-Math.PI / 2);
    const pos = terrainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setY(i, height(pos.getX(i), pos.getZ(i)));
    }
    terrainGeo.computeVertexNormals();

    // per-vertex color by height + slope (snow on high flat ground)
    const colors = new Float32Array(pos.count * 3);
    const nrm = terrainGeo.attributes.normal;
    const cRock = new THREE.Color(0xdfe2e6); // bright cool grey for the steepest cliffs
    const cRockHi = new THREE.Color(0xeef0f3);
    const cSand = new THREE.Color(0xd5dfe0); // pale icy shore, reads turquoise under water
    const cSnow = new THREE.Color(0xf6f8ff);
    const tmp = new THREE.Color();
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      const slope = nrm.getY(i); // 1 flat, 0 vertical
      tmp.copy(cRock).lerp(cRockHi, smoothstep(2, 26, y));
      // snow blankets everything down to the waterline except the very steepest cliffs
      const snow = Math.min(1, smoothstep(-1, 5, y) * smoothstep(0.22, 0.5, slope) + smoothstep(20, 36, y));
      tmp.lerp(cSnow, snow);
      tmp.lerp(cSand, smoothstep(3, -3, y)); // shoreline + bed -> pale
      colors[i * 3] = tmp.r; colors[i * 3 + 1] = tmp.g; colors[i * 3 + 2] = tmp.b;
    }
    terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const terrain = new THREE.Mesh(
      terrainGeo,
      new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95, metalness: 0 })
    );
    scene.add(terrain);

    // ---------- water: official three.js Water (ocean shader) ----------
    const waterNormals = new THREE.TextureLoader().load(
      './waternormals.jpg',
      (t) => { t.wrapS = t.wrapT = THREE.RepeatWrapping; }
    );
    const waterGeo = new THREE.PlaneGeometry(8000, 8000);
    const water = new Water(waterGeo, {
      textureWidth: 1024,
      textureHeight: 1024,
      waterNormals,
      sunDirection: sunDir.clone(),
      sunColor: 0xfff6e2,
      waterColor: 0x33707e, // turquoise lake
      distortionScale: 0.35, // gentle ripples -> near-still lake
      fog: scene.fog !== undefined,
    });
    water.rotation.x = -Math.PI / 2;
    // 'size' tiles the wave normal map: bigger value -> finer, smaller ripples (calmer look)
    water.material.uniforms['size'].value = 12.0;
    scene.add(water);

    // ---------- loop ----------
    function tick() {
      water.material.uniforms['time'].value += 1.0 / 240.0; // slow drift for a calm surface
      sky.material.uniforms.time.value += 1.0 / 60.0;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
