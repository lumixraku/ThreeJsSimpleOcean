<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fresnel Lake — three.js</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a1622; }
    #info {
      position: fixed; left: 12px; bottom: 10px; z-index: 10;
      font: 12px/1.4 system-ui, sans-serif; color: rgba(255,255,255,.7);
      text-shadow: 0 1px 2px rgba(0,0,0,.6); pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">拖拽旋转 · 滚轮缩放 — 远处水面镜面反射雪山，近处水清澈见底（菲涅尔）</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Water } from 'three/addons/objects/Water.js';

    // ---------- value-noise terrain heightfield ----------
    function hash(x, y) {
      const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }
    function vnoise(x, y) {
      const xi = Math.floor(x), yi = Math.floor(y);
      const xf = x - xi, yf = y - yi;
      const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
      const a = hash(xi, yi), b = hash(xi + 1, yi);
      const c = hash(xi, yi + 1), d = hash(xi + 1, yi + 1);
      return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
    }
    function fbm(x, y) {
      let s = 0, a = 0.5, f = 1;
      for (let i = 0; i < 5; i++) { s += a * vnoise(x * f, y * f); f *= 2; a *= 0.5; }
      return s;
    }
    // ridged fbm -> sharp mountain crests
    function ridged(x, y) {
      let s = 0, a = 0.5, f = 1;
      for (let i = 0; i < 5; i++) {
        let n = vnoise(x * f, y * f);
        n = 1 - Math.abs(2 * n - 1);
        s += a * n * n; f *= 2; a *= 0.5;
      }
      return s;
    }
    function smoothstep(e0, e1, x) {
      const t = Math.min(1, Math.max(0, (x - e0) / (e1 - e0)));
      return t * t * (3 - 2 * t);
    }
    // height(x,z): lake basin below 0, snow ridge rising for far -z.
    function height(x, z) {
      const basin = -4 + (fbm(x * 0.01, z * 0.01) - 0.5) * 2.0; // gentle lakebed
      const dist = -z; // how far in front of the camera
      const mtn = smoothstep(35, 120, dist);
      const ridge = ridged(x * 0.011 + 10, z * 0.011 + 10);
      const peakVar = 0.5 + 0.8 * fbm(x * 0.005 - 5, 3.0);
      const mountain = 3 + ridge * 78 * peakVar;
      return basin * (1 - mtn) + mountain * mtn;
    }

    // ---------- scene ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xc8dceb, 320, 720);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.5, 3000);
    camera.position.set(0, 5, 95);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 8, -50);
    controls.maxPolarAngle = Math.PI * 0.495; // don't go under the water
    controls.minDistance = 10;
    controls.maxDistance = 260;
    controls.update();

    // ---------- gradient sky dome ----------
    const sky = new THREE.Mesh(
      new THREE.SphereGeometry(1500, 32, 16),
      new THREE.ShaderMaterial({
        side: THREE.BackSide, depthWrite: false, fog: false,
        uniforms: {
          top: { value: new THREE.Color(0x2a6dd6) },
          bottom: { value: new THREE.Color(0xcfe4f2) },
        },
        vertexShader: `varying float h; void main(){
          vec4 wp = modelMatrix * vec4(position,1.0);
          h = normalize(wp.xyz).y;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }`,
        fragmentShader: `varying float h; uniform vec3 top; uniform vec3 bottom;
        void main(){
          float t = clamp(h*1.1 + 0.15, 0.0, 1.0);
          gl_FragColor = vec4(mix(bottom, top, t), 1.0);
        }`,
      })
    );
    scene.add(sky);

    // ---------- lights ----------
    const sun = new THREE.DirectionalLight(0xfff4e0, 1.5);
    sun.position.set(-120, 140, 60);
    scene.add(sun);
    // soft, near-shadowless fill so snow stays bright white even on steep faces
    scene.add(new THREE.HemisphereLight(0xdcecf7, 0xe6edf0, 1.1));
    scene.add(new THREE.AmbientLight(0xdbe6f0, 1.0));
    const fill = new THREE.DirectionalLight(0xeaf2fb, 0.8); // front fill toward the camera side
    fill.position.set(40, 30, 120);
    scene.add(fill);

    // ---------- terrain ----------
    const SIZE = 700, SEG = 320;
    const terrainGeo = new THREE.PlaneGeometry(SIZE, SIZE, SEG, SEG);
    terrainGeo.rotateX(-Math.PI / 2);
    const pos = terrainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setY(i, height(pos.getX(i), pos.getZ(i)));
    }
    terrainGeo.computeVertexNormals();

    // per-vertex color by height + slope (snow on high flat ground)
    const colors = new Float32Array(pos.count * 3);
    const nrm = terrainGeo.attributes.normal;
    const cRock = new THREE.Color(0xdfe2e6); // bright cool grey for the steepest cliffs
    const cRockHi = new THREE.Color(0xeef0f3);
    const cSand = new THREE.Color(0xd5dfe0); // pale icy shore, reads turquoise under water
    const cSnow = new THREE.Color(0xf6f8ff);
    const tmp = new THREE.Color();
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      const slope = nrm.getY(i); // 1 flat, 0 vertical
      tmp.copy(cRock).lerp(cRockHi, smoothstep(2, 26, y));
      // snow blankets everything down to the waterline except the very steepest cliffs
      const snow = Math.min(1, smoothstep(-1, 5, y) * smoothstep(0.22, 0.5, slope) + smoothstep(20, 36, y));
      tmp.lerp(cSnow, snow);
      tmp.lerp(cSand, smoothstep(3, -3, y)); // shoreline + bed -> pale
      colors[i * 3] = tmp.r; colors[i * 3 + 1] = tmp.g; colors[i * 3 + 2] = tmp.b;
    }
    terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const terrain = new THREE.Mesh(
      terrainGeo,
      new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95, metalness: 0 })
    );
    scene.add(terrain);

    // ---------- water: official three.js Water (ocean shader) ----------
    const waterNormals = new THREE.TextureLoader().load(
      './waternormals.jpg',
      (t) => { t.wrapS = t.wrapT = THREE.RepeatWrapping; }
    );
    const waterGeo = new THREE.PlaneGeometry(SIZE, SIZE);
    const water = new Water(waterGeo, {
      textureWidth: 1024,
      textureHeight: 1024,
      waterNormals,
      sunDirection: sun.position.clone().normalize(),
      sunColor: 0xffffff,
      waterColor: 0x33707e, // turquoise lake
      distortionScale: 2.4,
      fog: scene.fog !== undefined,
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // ---------- loop ----------
    function tick() {
      water.material.uniforms['time'].value += 1.0 / 60.0;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
